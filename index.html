<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTrack Elite | Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .ios-blur { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; }
        .history-square { width: 10px; height: 10px; border-radius: 2px; }
        .hidden { display: none; }
        input { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        .admin-user-card:hover { border-color: #3b82f6; cursor: pointer; background: rgba(59,130,246,0.1); }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div id="auth-screen" class="max-w-md mx-auto mt-10">
        <div class="ios-blur p-8">
            <h1 class="text-3xl font-black text-center mb-8 italic text-blue-500">PROTRACK ELITE</h1>
            <div class="flex bg-black/50 p-1 rounded-2xl mb-8">
                <button onclick="toggleAuth('login')" id="tab-l" class="flex-1 py-3 rounded-xl font-bold text-blue-400 bg-white/5">Login</button>
                <button onclick="toggleAuth('signup')" id="tab-s" class="flex-1 py-3 rounded-xl font-bold text-gray-500">Signup</button>
            </div>
            <div class="space-y-4">
                <input id="u-name" type="text" placeholder="Username" class="w-full p-4 rounded-2xl outline-none">
                <input id="u-pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl outline-none">
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase">Enter System</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden max-w-5xl mx-auto">
        <header class="flex justify-between items-center py-6">
            <div>
                <h1 id="user-greeting" class="text-2xl font-black italic">Assalamu Alaikum</h1>
                <p id="streak-info" class="text-orange-500 font-bold text-sm tracking-widest">🔥 0 DAY STREAK</p>
            </div>
            <div class="flex gap-2">
                <button id="admin-toggle-btn" onclick="toggleView('admin')" class="hidden ios-blur px-4 py-2 text-xs border border-blue-600 text-blue-500 font-bold">🛠 Admin Panel</button>
                <button id="home-toggle-btn" onclick="toggleView('home')" class="hidden ios-blur px-4 py-2 text-xs font-bold text-blue-400 tracking-widest uppercase">🏠 My Tracker</button>
                <button onclick="openProfileModal()" class="ios-blur px-4 py-2 text-xs font-bold">👤 Profile</button>
                <button onclick="logout()" class="ios-blur px-4 py-2 text-xs font-bold text-red-500 uppercase">Exit</button>
            </div>
        </header>

        <div id="stats-area" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="ios-blur p-6">
                <p class="text-[10px] text-gray-500 font-bold mb-1 uppercase tracking-widest">Year Progress 2026</p>
                <div id="year-perc" class="text-4xl font-black italic mb-2 text-blue-500">0%</div>
                <div class="w-full h-2 bg-white/5 rounded-full overflow-hidden">
                    <div id="year-bar" class="h-full bg-blue-500 transition-all duration-1000"></div>
                </div>
            </div>
            <div class="ios-blur p-6 col-span-2 overflow-x-auto">
                <p class="text-[10px] text-gray-500 font-bold mb-2 uppercase tracking-widest">Global Activity Grid</p>
                <div id="history-grid" class="flex flex-wrap gap-1"></div>
            </div>
        </div>

        <div id="user-area" class="space-y-6">
            <div class="ios-blur p-6">
                <div class="flex gap-3 mb-8">
                    <input id="h-input" type="text" placeholder="Add New Goal (e.g. Study, Kuran)..." class="flex-1 p-4 rounded-2xl outline-none">
                    <button onclick="openHabitModal('add')" class="bg-blue-600 w-16 h-16 rounded-2xl font-black text-2xl shadow-lg">+</button>
                </div>
                <div id="h-list" class="space-y-4"></div>
            </div>
        </div>

        <div id="admin-area" class="hidden space-y-8 pb-20">
            <h2 class="text-2xl font-black text-blue-500 tracking-tighter uppercase">Student Monitoring Board</h2>
            <div id="admin-user-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <div id="habit-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50">
        <div class="ios-blur p-8 max-w-sm w-full border border-white/10 shadow-2xl">
            <h2 id="modal-title" class="text-xl font-black mb-6 text-center italic">Configure Goal</h2>
            <input id="m-name" type="text" class="w-full p-4 rounded-2xl mb-4" placeholder="Goal Name">
            <div class="flex gap-2 mb-8">
                <div class="flex-1"><p class="text-[10px] text-center text-gray-500 mb-1">HOURS</p><input id="m-hrs" type="number" class="w-full p-4 rounded-2xl text-center"></div>
                <div class="flex-1"><p class="text-[10px] text-center text-gray-500 mb-1">MINS</p><input id="m-mins" type="number" class="w-full p-4 rounded-2xl text-center"></div>
            </div>
            <button id="modal-save-btn" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase tracking-widest">Apply Settings</button>
            <button onclick="closeModal('habit-modal')" class="w-full mt-4 text-gray-500 text-xs">Close</button>
        </div>
    </div>

    <div id="user-details-modal" class="hidden fixed inset-0 bg-black/98 flex items-center justify-center p-4 z-[60] overflow-y-auto">
        <div class="ios-blur p-8 max-w-2xl w-full my-10">
            <div class="flex justify-between items-start mb-8">
                <h2 id="det-user-name" class="text-3xl font-black italic text-blue-500">Username</h2>
                <button onclick="closeModal('user-details-modal')" class="text-2xl text-gray-500">&times;</button>
            </div>
            
            <div class="space-y-6">
                <div>
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 italic">Today's Goals Status</h3>
                    <div id="det-today-goals" class="space-y-3"></div>
                </div>
                <div>
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 italic">Full History Grid</h3>
                    <div id="det-history-grid" class="flex flex-wrap gap-1 ios-blur p-4"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50">
        <div class="ios-blur p-8 max-w-sm w-full">
            <h2 class="text-xl font-black mb-6 text-center">Update Credentials</h2>
            <input id="p-user" type="text" placeholder="New Username" class="w-full p-4 rounded-2xl mb-4">
            <input id="p-pass" type="password" placeholder="New Password" class="w-full p-4 rounded-2xl mb-8">
            <button onclick="updateProfile()" class="w-full bg-green-600 py-4 rounded-2xl font-black">SAVE CHANGES</button>
            <button onclick="closeModal('profile-modal')" class="w-full mt-4 text-gray-500 text-xs">Cancel</button>
        </div>
    </div>

    <script>
        let curUser = localStorage.getItem('activeUser') || "";
        let uData = {};
        let authMode = 'login';
        let editingIdx = -1;
        const ADMIN_ID = "saquibalam0025";

        window.onload = () => {
            if(!localStorage.getItem(`u_${ADMIN_ID}`)) {
                localStorage.setItem(`u_${ADMIN_ID}`, JSON.stringify({pass:'saquibalam', habits:[], history:{}}));
                let reg = JSON.parse(localStorage.getItem('registry')) || [];
                if(!reg.includes(ADMIN_ID)) reg.push(ADMIN_ID);
                localStorage.setItem('registry', JSON.stringify(reg));
            }
            if(curUser) launchApp();
        };

        function toggleAuth(mode) {
            authMode = mode;
            document.getElementById('tab-l').className = mode === 'login' ? 'flex-1 py-3 rounded-xl font-bold text-blue-400 bg-white/5' : 'flex-1 py-3 rounded-xl font-bold text-gray-500';
            document.getElementById('tab-s').className = mode === 'signup' ? 'flex-1 py-3 rounded-xl font-bold text-green-400 bg-white/5' : 'flex-1 py-3 rounded-xl font-bold text-gray-500';
            document.getElementById('auth-btn').innerText = mode === 'login' ? 'Enter System' : 'Sign Up Now';
        }

        function handleAuth() {
            const u = document.getElementById('u-name').value.trim();
            const p = document.getElementById('u-pass').value.trim();
            if(!u || !p) return alert("Missing fields");

            if(authMode === 'signup') {
                if(localStorage.getItem(`u_${u}`)) return alert("Taken");
                localStorage.setItem(`u_${u}`, JSON.stringify({pass:p, habits:[], history:{}}));
                let reg = JSON.parse(localStorage.getItem('registry')) || [];
                reg.push(u); localStorage.setItem('registry', JSON.stringify(reg));
                alert("Account Ready!"); toggleAuth('login');
            } else {
                const stored = JSON.parse(localStorage.getItem(`u_${u}`));
                if(stored && stored.pass === p) {
                    curUser = u; localStorage.setItem('activeUser', u); launchApp();
                } else alert("Denied");
            }
        }

        function launchApp() {
            uData = JSON.parse(localStorage.getItem(`u_${curUser}`));
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-greeting').innerText = `Assalamu Alaikum, ${curUser}!`;
            if(curUser === ADMIN_ID) document.getElementById('admin-toggle-btn').classList.remove('hidden');
            renderHabits(); renderGrid(); calculateStreak(); updateYear();
        }

        function renderHabits() {
            const list = document.getElementById('h-list');
            const today = new Date().toISOString().split('T')[0];
            const status = uData.history[today] || [];
            list.innerHTML = "";
            uData.habits.forEach((h, i) => {
                const checked = status[i] ? 'checked' : '';
                list.innerHTML += `
                    <div class="ios-blur p-6 flex items-center justify-between border border-white/5 hover:border-white/20 transition">
                        <div><p class="font-black text-lg">${h.name}</p><p class="text-[10px] text-blue-400 font-black italic">TARGET: ${h.time}</p></div>
                        <div class="flex items-center gap-4">
                            <button onclick="editHabit(${i})" class="opacity-30 hover:opacity-100 transition">✏️</button>
                            <button onclick="deleteHabit(${i})" class="opacity-30 hover:opacity-100 transition">🗑️</button>
                            <input type="checkbox" ${checked} onclick="toggleH(${i})" class="w-10 h-10 rounded-full border-2 border-white/20 appearance-none checked:bg-blue-600 flex items-center justify-center checked:after:content-['✓'] text-white cursor-pointer">
                        </div>
                    </div>`;
            });
        }

        function toggleH(i) {
            const t = new Date().toISOString().split('T')[0];
            if(!uData.history[t]) uData.history[t] = new Array(uData.habits.length).fill(false);
            uData.history[t][i] = !uData.history[t][i];
            save(); renderGrid(); calculateStreak();
        }

        function renderGrid(targetId = 'history-grid', data = uData) {
            const grid = document.getElementById(targetId);
            grid.innerHTML = "";
            const today = new Date();
            for(let i=100; i>=0; i--) {
                const d = new Date(); d.setDate(today.getDate() - i);
                const ds = d.toISOString().split('T')[0];
                const active = (data.history[ds] || []).some(x => x);
                grid.innerHTML += `<div class="history-square ${active ? 'bg-green-500 shadow-[0_0_5px_rgba(34,197,94,0.5)]' : 'bg-white/5'}"></div>`;
            }
        }

        function toggleView(v) {
            document.getElementById('user-area').classList.toggle('hidden', v === 'admin');
            document.getElementById('admin-area').classList.toggle('hidden', v !== 'admin');
            document.getElementById('stats-area').classList.toggle('hidden', v === 'admin');
            document.getElementById('admin-toggle-btn').classList.toggle('hidden', v === 'admin');
            document.getElementById('home-toggle-btn').classList.toggle('hidden', v !== 'admin');
            if(v === 'admin') loadAdminPanel();
        }

        function loadAdminPanel() {
            const reg = JSON.parse(localStorage.getItem('registry')) || [];
            const list = document.getElementById('admin-user-list');
            list.innerHTML = "";
            const today = new Date().toISOString().split('T')[0];

            reg.forEach(u => {
                const d = JSON.parse(localStorage.getItem(`u_${u}`));
                const done = (d.history[today] || []).filter(x => x).length;
                const total = d.habits.length;
                const p = total > 0 ? Math.round((done/total)*100) : 0;

                list.innerHTML += `
                    <div onclick="showUserDetails('${u}')" class="ios-blur p-6 admin-user-card border-l-4 ${p > 50 ? 'border-green-500' : 'border-blue-500'} transition">
                        <div class="flex justify-between items-center mb-4">
                            <span class="font-black text-lg">${u}</span>
                            <span class="text-blue-400 font-bold">${p}% Today</span>
                        </div>
                        <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-500" style="width: ${p}%"></div>
                        </div>
                        <p class="text-[9px] text-gray-500 mt-3 uppercase tracking-widest font-bold">Click for deep analysis →</p>
                    </div>`;
            });
        }

        function showUserDetails(user) {
            const data = JSON.parse(localStorage.getItem(`u_${user}`));
            const today = new Date().toISOString().split('T')[0];
            const status = data.history[today] || [];
            
            document.getElementById('det-user-name').innerText = user;
            const goalList = document.getElementById('det-today-goals');
            goalList.innerHTML = "";

            data.habits.forEach((h, i) => {
                const done = status[i];
                goalList.innerHTML += `
                    <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
                        <span class="font-bold ${done ? 'text-green-400' : 'text-gray-400'}">${h.name}</span>
                        <span class="text-[10px] px-3 py-1 rounded-full ${done ? 'bg-green-500/20 text-green-500' : 'bg-red-500/20 text-red-500'} font-bold">
                            ${done ? 'COMPLETED' : 'PENDING'} (${h.time})
                        </span>
                    </div>`;
            });

            renderGrid('det-history-grid', data);
            document.getElementById('user-details-modal').classList.remove('hidden');
        }

        // --- Helper Functions (Edit, Delete, Profile, Year, Modal) ---
        function openHabitModal(mode, idx = -1) {
            editingIdx = idx;
            const name = mode === 'add' ? document.getElementById('h-input').value.trim() : uData.habits[idx].name;
            if(!name && mode === 'add') return;
            document.getElementById('m-name').value = name;
            document.getElementById('habit-modal').classList.remove('hidden');
            document.getElementById('modal-save-btn').onclick = () => {
                const n = document.getElementById('m-name').value;
                const h = document.getElementById('m-hrs').value || 0, m = document.getElementById('m-mins').value || 0;
                const obj = { name: n, time: `${h}h ${m}m` };
                if(editingIdx > -1) uData.habits[editingIdx] = obj; else uData.habits.push(obj);
                save(); renderHabits(); closeModal('habit-modal'); document.getElementById('h-input').value = "";
            };
        }
        function editHabit(i) { openHabitModal('edit', i); }
        function deleteHabit(i) { if(confirm("Delete goal?")) { uData.habits.splice(i,1); save(); renderHabits(); } }
        function updateYear() {
            const now = new Date(); const start = new Date(now.getFullYear(), 0, 0);
            const diff = Math.floor((now - start) / 86400000);
            const perc = ((diff / 365) * 100).toFixed(1);
            document.getElementById('year-perc').innerText = perc + "%";
            document.getElementById('year-bar').style.width = perc + "%";
        }
        function calculateStreak() {
            const keys = Object.keys(uData.history).sort().reverse(); let s = 0;
            for(let k of keys) { if(uData.history[k].some(x => x)) s++; else break; }
            document.getElementById('streak-info').innerText = `🔥 ${s} DAY STREAK`;
        }
        function updateProfile() {
            const nU = document.getElementById('p-user').value.trim(), nP = document.getElementById('p-pass').value.trim();
            if(!nU || !nP) return; if(nU !== curUser && localStorage.getItem(`u_${nU}`)) return alert("Taken");
            localStorage.setItem(`u_${nU}`, JSON.stringify({...uData, pass: nP}));
            if(nU !== curUser) {
                localStorage.removeItem(`u_${curUser}`); let reg = JSON.parse(localStorage.getItem('registry'));
                reg[reg.indexOf(curUser)] = nU; localStorage.setItem('registry', JSON.stringify(reg));
            }
            curUser = nU; localStorage.setItem('activeUser', nU); location.reload();
        }
        function openProfileModal() { document.getElementById('p-user').value = curUser; document.getElementById('profile-modal').classList.remove('hidden'); }
        function save() { localStorage.setItem(`u_${curUser}`, JSON.stringify(uData)); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function logout() { localStorage.removeItem('activeUser'); location.reload(); }
    </script>
</body>
</html>
